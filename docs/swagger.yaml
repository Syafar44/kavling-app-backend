basePath: /api
definitions:
  handlers.arusKasRequest:
    properties:
      id_bank:
        example: 1
        type: integer
      jenis:
        enum:
        - Pemasukan
        - Pengeluaran
        example: Pengeluaran
        type: string
      kategori:
        example: Biaya Operasional
        type: string
      keterangan:
        example: Pembelian ATK
        type: string
      nominal:
        example: 500000
        type: number
      tanggal:
        example: "2026-04-14"
        type: string
    required:
    - jenis
    - kategori
    - nominal
    type: object
  handlers.bankRequest:
    properties:
      is_kas:
        example: 0
        type: integer
      nama_bank:
        example: BRI
        type: string
      nama_rekening:
        example: PT Kavling Mentaya
        type: string
      no_rekening:
        example: "1234567890"
        type: string
    required:
    - nama_bank
    - nama_rekening
    - no_rekening
    type: object
  handlers.createDenahRequest:
    properties:
      nama:
        example: Blok A
        type: string
      svg_content:
        example: <svg viewBox='0 0 800 600'>...</svg>
        type: string
    required:
    - nama
    - svg_content
    type: object
  handlers.createUserRequest:
    properties:
      is_admin:
        example: 0
        type: integer
      nama:
        example: John Doe
        type: string
      password:
        example: password123
        minLength: 6
        type: string
      username:
        example: johndoe
        type: string
    required:
    - nama
    - password
    - username
    type: object
  handlers.loginRequest:
    properties:
      captcha:
        example: ""
        type: string
      password:
        example: admin123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  handlers.loginResponse:
    properties:
      data:
        properties:
          token:
            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            type: string
          user:
            properties:
              id:
                example: 1
                type: integer
              is_admin:
                example: 1
                type: integer
              nama:
                example: Administrator
                type: string
              username:
                example: admin
                type: string
            type: object
        type: object
      message:
        example: Login berhasil
        type: string
      success:
        example: true
        type: boolean
    type: object
  handlers.marketingRequest:
    properties:
      alamat:
        example: Jl. Contoh No. 1, Sampit
        type: string
      email:
        example: budi@email.com
        type: string
      nama:
        example: Budi Santoso
        type: string
      no_telp:
        example: "08123456789"
        type: string
      persentase_komisi:
        example: 2.5
        type: number
      status:
        example: 1
        type: integer
    required:
    - nama
    type: object
  handlers.templateRequest:
    properties:
      is_aktif:
        example: 1
        type: integer
      isi:
        example: Halo {nama_customer}, pembayaran ke-{ke} sebesar Rp {nominal} telah
          kami terima.
        type: string
      nama:
        example: Kwitansi Pembayaran
        type: string
      tipe:
        example: kwitansi
        type: string
    required:
    - isi
    - nama
    - tipe
    type: object
  handlers.updateAccessRequest:
    properties:
      menu_ids:
        example:
        - 1
        - 2
        - 3
        - 4
        items:
          type: integer
        type: array
    type: object
  handlers.updateDenahRequest:
    properties:
      nama:
        example: Blok A
        type: string
      svg_content:
        example: <svg viewBox='0 0 800 600'>...</svg>
        type: string
    required:
    - nama
    type: object
  handlers.updateKavlingRequest:
    properties:
      harga_jual_cash:
        example: 157500000
        type: number
      harga_per_meter:
        example: 2500000
        type: number
      lebar_belakang:
        example: 6
        type: number
      lebar_depan:
        example: 6
        type: number
      luas_tanah:
        example: 63
        type: number
      panjang_kanan:
        example: 10.5
        type: number
      panjang_kiri:
        example: 10.5
        type: number
      status:
        example: 0
        type: integer
    type: object
  handlers.updateUserRequest:
    properties:
      is_admin:
        example: 0
        type: integer
      nama:
        example: John Doe
        type: string
      password:
        example: newpassword
        type: string
      status:
        enum:
        - AKTIF
        - BLOKIR
        example: AKTIF
        type: string
    type: object
  handlers.waRequest:
    properties:
      api_key:
        example: secret-key
        type: string
      api_url:
        example: https://wa.api.example.com
        type: string
      id_device:
        example: device-001
        type: string
      no_telp:
        example: "628123456789"
        type: string
    required:
    - api_url
    - id_device
    - no_telp
    type: object
  services.BookingInput:
    properties:
      id_customer:
        type: integer
      id_kavling:
        type: integer
      id_marketing:
        type: integer
      id_user:
        type: integer
      keterangan:
        type: string
      nominal_booking:
        type: number
      tgl_expired:
        type: string
    required:
    - id_customer
    - id_kavling
    type: object
  services.CashInput:
    properties:
      harga_jual:
        type: number
      id_customer:
        type: integer
      id_kavling:
        type: integer
      id_marketing:
        type: integer
      id_user:
        type: integer
      keterangan:
        type: string
    required:
    - harga_jual
    - id_customer
    - id_kavling
    type: object
  services.ConvertInput:
    properties:
      harga_jual:
        type: number
      id_user:
        type: integer
      jenis:
        description: cash | kredit
        type: string
      keterangan:
        type: string
      lama_cicilan:
        type: integer
      tgl_mulai_cicilan:
        type: string
      uang_muka:
        type: number
    required:
    - harga_jual
    - jenis
    type: object
  services.KreditInput:
    properties:
      harga_jual:
        type: number
      id_customer:
        type: integer
      id_kavling:
        type: integer
      id_marketing:
        type: integer
      id_user:
        type: integer
      keterangan:
        type: string
      lama_cicilan:
        minimum: 1
        type: integer
      tgl_mulai_cicilan:
        type: string
      uang_muka:
        type: number
    required:
    - harga_jual
    - id_customer
    - id_kavling
    - lama_cicilan
    type: object
host: localhost:8080
info:
  contact:
    email: admin@kavling-mentaya.com
    name: API Support
  description: REST API backend untuk sistem manajemen penjualan kavling tanah. Semua
    endpoint (kecuali /auth/login) memerlukan Bearer Token JWT di header Authorization.
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: Kavling Mentaya API
  version: "1.0"
paths:
  /activity-log:
    get:
      description: Mengambil log aktivitas semua user (admin only)
      parameters:
      - description: 'Jumlah record (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Log aktivitas user
      tags:
      - Users
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentikasi user dan mendapatkan JWT token. Setelah 5x gagal login,
        sistem meminta captcha.
      parameters:
      - description: Kredensial login
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.loginResponse'
        "400":
          description: Bad Request
          schema:
            type: object
      summary: Login user
      tags:
      - Auth
  /bank:
    get:
      description: Mengambil daftar semua rekening bank dan kas yang aktif
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: List rekening bank/kas
      tags:
      - Bank
    post:
      consumes:
      - application/json
      description: Menambahkan rekening bank atau kas tunai baru
      parameters:
      - description: Data bank
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.bankRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Tambah rekening bank/kas
      tags:
      - Bank
  /bank/{id}:
    delete:
      description: Menghapus rekening bank berdasarkan ID
      parameters:
      - description: Bank ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Hapus rekening bank/kas
      tags:
      - Bank
    put:
      consumes:
      - application/json
      description: Mengubah data rekening bank berdasarkan ID
      parameters:
      - description: Bank ID
        in: path
        name: id
        required: true
        type: integer
      - description: Data update bank
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.bankRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Update rekening bank/kas
      tags:
      - Bank
  /booking:
    get:
      description: Mengambil daftar semua booking yang masih aktif (status=1)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: List booking aktif
      tags:
      - Booking
    post:
      consumes:
      - application/json
      description: Membuat booking kavling. Kavling harus berstatus Kosong (0). Status
        kavling berubah menjadi Booking (1).
      parameters:
      - description: Data booking
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.BookingInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Buat booking baru
      tags:
      - Booking
  /booking/{id}:
    delete:
      description: Membatalkan booking aktif. Status kavling dikembalikan ke Kosong
        (0).
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Batalkan booking
      tags:
      - Booking
  /booking/{id}/convert:
    post:
      consumes:
      - application/json
      description: Mengubah booking menjadi transaksi cash atau kredit. Jika kredit,
        cicilan per bulan otomatis dihitung = (harga_jual - uang_muka) / lama_cicilan.
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      - description: 'Data konversi (jenis: cash|kredit)'
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.ConvertInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Konversi booking ke transaksi
      tags:
      - Booking
  /customers:
    get:
      description: Mengambil daftar semua customer (pembeli)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: List customer
      tags:
      - Customer
    post:
      consumes:
      - multipart/form-data
      description: Membuat data customer baru. Mendukung upload file foto KTP dan
        KK (multipart/form-data).
      parameters:
      - description: Nama lengkap
        in: formData
        name: nama
        required: true
        type: string
      - description: No. telepon
        in: formData
        name: no_telp
        type: string
      - description: Nomor KTP
        in: formData
        name: no_ktp
        type: string
      - description: Alamat
        in: formData
        name: alamat
        type: string
      - description: Pekerjaan
        in: formData
        name: pekerjaan
        type: string
      - description: Foto KTP (jpg/png)
        in: formData
        name: foto_ktp
        type: file
      - description: Foto KK (jpg/png)
        in: formData
        name: foto_kk
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Tambah customer
      tags:
      - Customer
  /customers/{id}:
    delete:
      description: Menghapus customer berdasarkan ID
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Hapus customer
      tags:
      - Customer
    get:
      description: Mengambil detail satu customer berdasarkan ID
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Detail customer
      tags:
      - Customer
    put:
      consumes:
      - multipart/form-data
      description: Mengubah data customer. Mendukung re-upload foto KTP/KK.
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Nama lengkap
        in: formData
        name: nama
        type: string
      - description: No. telepon
        in: formData
        name: no_telp
        type: string
      - description: Nomor KTP
        in: formData
        name: no_ktp
        type: string
      - description: Alamat
        in: formData
        name: alamat
        type: string
      - description: Pekerjaan
        in: formData
        name: pekerjaan
        type: string
      - description: Foto KTP baru
        in: formData
        name: foto_ktp
        type: file
      - description: Foto KK baru
        in: formData
        name: foto_kk
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Update customer
      tags:
      - Customer
  /denah-kavling:
    get:
      description: Mengambil daftar semua denah kavling beserta ringkasan jumlah kavling
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: List semua denah kavling
      tags:
      - Denah Kavling
    post:
      consumes:
      - application/json
      description: Menerima nama dan kode SVG. Sistem mem-parse SVG, mengekstrak semua
        <path id="..."> sebagai kavling, lalu menyimpan denah beserta kavling-kavlingnya
        secara otomatis.
      parameters:
      - description: Data denah kavling
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createDenahRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Buat denah kavling baru dari SVG
      tags:
      - Denah Kavling
  /denah-kavling/{id}:
    delete:
      description: Menghapus denah beserta semua kavling di dalamnya. Gagal jika ada
        kavling dengan transaksi aktif.
      parameters:
      - description: Denah ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Ada transaksi aktif
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Hapus denah kavling
      tags:
      - Denah Kavling
    get:
      description: Mengambil detail satu denah kavling beserta seluruh kavling di
        dalamnya
      parameters:
      - description: Denah ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Detail denah kavling
      tags:
      - Denah Kavling
    put:
      consumes:
      - application/json
      description: Mengubah nama dan/atau SVG content denah. Jika svg_content diisi,
        viewbox akan diperbarui. Kavling yang sudah ada tidak diubah.
      parameters:
      - description: Denah ID
        in: path
        name: id
        required: true
        type: integer
      - description: Data update denah
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateDenahRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Update denah kavling
      tags:
      - Denah Kavling
  /kavling:
    get:
      description: Mengambil daftar kavling. Bisa difilter berdasarkan denah_kavling_id.
      parameters:
      - description: Filter berdasarkan denah kavling ID
        in: query
        name: denah_kavling_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: List kavling
      tags:
      - Kavling
  /kavling/{id}:
    delete:
      description: Menghapus kavling. Hanya kavling dengan status Kosong (0) yang
        bisa dihapus.
      parameters:
      - description: Kavling ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Kavling sudah ada transaksi
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Hapus kavling
      tags:
      - Kavling
    get:
      description: Mengambil detail satu kavling berdasarkan ID
      parameters:
      - description: Kavling ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Detail kavling
      tags:
      - Kavling
    put:
      consumes:
      - application/json
      description: Mengubah data dimensi, harga, dan status kavling. kode_kavling
        dan kode_map bersifat immutable (tidak bisa diubah).
      parameters:
      - description: Kavling ID
        in: path
        name: id
        required: true
        type: integer
      - description: Data update kavling
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateKavlingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Update kavling
      tags:
      - Kavling
  /keuangan/rekap-kredit:
    get:
      description: 'Menghitung rekap cicilan semua kavling kredit: bulan berjalan,
        jumlah pembayaran, tunggakan, nominal tunggakan, dan status bulan ini.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Rekap kredit semua kavling
      tags:
      - Keuangan
  /keuangan/statistik:
    get:
      description: Mengambil rekap pemasukan dan pengeluaran per bulan untuk tahun
        tertentu
      parameters:
      - description: 'Tahun (default: tahun sekarang)'
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Statistik arus kas per bulan
      tags:
      - Keuangan
  /keuangan/transaksi:
    get:
      description: Mengambil daftar transaksi arus kas dengan filter tanggal. Response
        juga mencakup total pemasukan, pengeluaran, dan saldo.
      parameters:
      - description: Dari tanggal (YYYY-MM-DD)
        in: query
        name: dari
        type: string
      - description: Sampai tanggal (YYYY-MM-DD)
        in: query
        name: sampai
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
